name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Wipe the previous nightly release+tag so the build matrix uploads to a
  # fresh, clean release. Skipped on tag pushes (versioned releases) and
  # manual dispatches.
  cleanup-nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Delete previous nightly release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

  build:
    needs: [cleanup-nightly]
    if: always() && (needs.cleanup-nightly.result == 'success' || needs.cleanup-nightly.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file \
            libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Add wasm32 target (frontend)
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Trunk (Leptos bundler)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      # ---- Stable release on tag push (v*) ----------------------------------
      - name: Build & publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'One Piece RPG Desktop ${{ github.ref_name }}'
          releaseBody: |
            Téléchargez l'installateur correspondant à votre OS ci-dessous :
            - **Windows** : `.msi` (recommandé) ou `.exe` (NSIS)
            - **macOS** : `.dmg` (Apple Silicon ou Intel selon votre machine)
            - **Linux** : `.deb` (Debian/Ubuntu), `.rpm` (Fedora/openSUSE), `.AppImage` (universel)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ---- Rolling nightly on every push to main ----------------------------
      - name: Build & publish nightly (rolling)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: nightly
          releaseName: 'Nightly (build automatique)'
          releaseBody: |
            🌙 **Build automatique du dernier commit `main` (${{ github.sha }})**.

            Cette release est **écrasée à chaque push** sur `main`. Pour les versions stables, voir les releases versionnées.

            Téléchargez l'installateur correspondant à votre OS ci-dessous.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # ---- Manual dispatch: just build, don't publish -----------------------
      - name: Build only (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
