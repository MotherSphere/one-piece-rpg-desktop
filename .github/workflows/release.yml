name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# Cancel any in-flight nightly build when a new push lands. Tag/manual builds
# get a unique group so they never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

jobs:
  # Wipe the previous nightly release+tag so the build matrix uploads to a
  # fresh, clean release. Skipped on tag pushes (versioned releases) and
  # manual dispatches.
  cleanup-nightly:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Delete previous nightly release & tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true

  build:
    needs: [cleanup-nightly]
    if: always() && (needs.cleanup-nightly.result == 'success' || needs.cleanup-nightly.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file \
            libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Add wasm32 target (frontend)
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Trunk (Leptos bundler)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      # ---- Stable release on tag push (v*) ----------------------------------
      - name: Build & publish stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'One Piece RPG Desktop ${{ github.ref_name }}'
          releaseBody: |
            Téléchargez l'installateur correspondant à votre OS ci-dessous :
            - **Windows** : `.msi` (recommandé) ou `.exe` (NSIS)
            - **macOS** : `.dmg` (Apple Silicon ou Intel selon votre machine)
            - **Linux** : `.deb` (Debian/Ubuntu), `.rpm` (Fedora/openSUSE), `.AppImage` (universel)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # ---- Rolling nightly on every push to main ----------------------------
      - name: Build & publish nightly (rolling)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: nightly
          releaseName: 'Nightly (build automatique)'
          releaseBody: |
            🌙 **Build automatique du dernier commit `main` (${{ github.sha }})**.

            Cette release est **écrasée à chaque push** sur `main`. Pour les versions stables, voir les releases versionnées.

            Téléchargez l'installateur correspondant à votre OS ci-dessous.
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}

      # ---- Manual dispatch: just build, don't publish -----------------------
      - name: Build only (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      # ---- Locate the raw portable binary that tauri-action built -----------
      # tauri-action only uploads bundled installers (.msi/.exe-setup/.dmg/...)
      # but never the raw exe/binary. We grab it from target/ and rename it
      # for clarity, then upload to the same release.
      - name: Locate & rename portable binary
        if: github.event_name == 'push'
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows-latest)
              src="src-tauri/target/release/one-piece-rpg-desktop.exe"
              dst="onepiecerpg-lejeu-windows-x64-portable.exe"
              ;;
            ubuntu-22.04)
              src="src-tauri/target/release/one-piece-rpg-desktop"
              dst="onepiecerpg-lejeu-linux-x64-portable"
              ;;
            macos-latest)
              target="${{ matrix.rust-targets }}"
              src="src-tauri/target/${target}/release/one-piece-rpg-desktop"
              if [[ "$target" == "aarch64-apple-darwin" ]]; then
                dst="onepiecerpg-lejeu-macos-arm64-portable"
              else
                dst="onepiecerpg-lejeu-macos-x64-portable"
              fi
              ;;
          esac
          cp "$src" "$dst"
          echo "PORTABLE_BIN=$dst" >> "$GITHUB_ENV"

      - name: Upload portable binary to release
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"
          else
            tag="nightly"
          fi
          gh release upload "$tag" "$PORTABLE_BIN" --repo ${{ github.repository }} --clobber
