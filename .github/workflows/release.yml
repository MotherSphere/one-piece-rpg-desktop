name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file \
            libxdo-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Add wasm32 target (frontend)
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install Trunk (Leptos bundler)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Build & bundle (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'One Piece RPG Desktop ${{ github.ref_name }}'
          releaseBody: |
            Téléchargez l'installateur correspondant à votre OS ci-dessous :
            - **Windows** : `.msi` (recommandé) ou `.exe` (NSIS)
            - **macOS** : `.dmg` (Apple Silicon ou Intel selon votre machine)
            - **Linux** : `.deb` (Debian/Ubuntu), `.rpm` (Fedora/openSUSE), `.AppImage` (universel)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
